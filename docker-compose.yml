version: '3.8'

services:
  web:
    build: .
    container_name: social_services
    restart: unless-stopped
    volumes:
      # Persist media files (photos) on host
      - ./media:/app/media
      # Persist database on host (for SQLite)
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db.sqlite3}
