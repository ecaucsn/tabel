version: '3.8'

services:
  web:
    build: .
    container_name: social_services
    restart: unless-stopped
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - SECRET_KEY=your-secret-key-change-this-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,your-server-ip
