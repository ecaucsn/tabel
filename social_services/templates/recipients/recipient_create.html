{% extends 'base.html' %}

{% block title %}Добавление проживающего{% endblock %}

{% block content %}
<div class="py-6">
    <!-- Header -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mx-4 mb-4">
        <div class="flex items-center gap-4">
            <a href="{% url 'recipients:list' %}" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="К списку">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            <div>
                <h1 class="text-xl font-semibold text-slate-800">Добавление проживающего</h1>
                <p class="text-sm text-slate-500 mt-1">Заполните данные нового проживающего</p>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 mx-4">
        <form method="post" enctype="multipart/form-data" class="p-6">
            {% csrf_token %}
            
            <!-- Personal Data Section -->
            <div class="mb-8">
                <h2 class="text-lg font-semibold text-slate-800 mb-4">Персональные данные</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Фамилия *</label>
                        <input type="text" name="last_name" required
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="Иванов">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Имя *</label>
                        <input type="text" name="first_name" required
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="Иван">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Отчество</label>
                        <input type="text" name="patronymic"
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="Иванович">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Дата рождения *</label>
                        <input type="date" name="birth_date" required
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Фотография</label>
                        <input type="file" name="photo" accept="image/*"
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    </div>
                </div>
            </div>
            
            <!-- Placement Section -->
            <div class="mb-8">
                <h2 class="text-lg font-semibold text-slate-800 mb-4">Размещение</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Статус</label>
                        <select name="placement"
                                class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                                onchange="toggleDepartmentFields(this.value)">
                            {% for value, label in placement_choices %}
                            <option value="{{ value }}" {% if value == 'internat' %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div id="departmentField">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Отделение</label>
                        <select name="department"
                                class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                            <option value="">-- Выберите отделение --</option>
                            {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div id="roomField">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Комната</label>
                        <input type="text" name="room"
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                               placeholder="101">
                    </div>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Дата заселения</label>
                    <input type="date" name="admission_date"
                           class="w-full md:w-1/3 px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                           value="{{ today }}">
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
                <a href="{% url 'recipients:list' %}"
                   class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">
                    Отмена
                </a>
                <button type="submit"
                        class="px-6 py-2 bg-primary-500 hover:bg-primary-600 text-white font-medium rounded-lg transition-colors">
                    Сохранить
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function toggleDepartmentFields(placement) {
    const departmentField = document.getElementById('departmentField');
    const roomField = document.getElementById('roomField');
    
    if (placement === 'internat') {
        departmentField.style.display = 'block';
        roomField.style.display = 'block';
    } else {
        departmentField.style.display = 'none';
        roomField.style.display = 'none';
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    const placementSelect = document.querySelector('select[name="placement"]');
    toggleDepartmentFields(placementSelect.value);
});
</script>
{% endblock %}
